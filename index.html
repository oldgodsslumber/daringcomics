function renderDice(){
  const el=document.getElementById('dice-content'),ch=S.char;
  const ex=S.team?.expanded;const exSkills=ex?['Combat','Expertise','Social','Undercover']:[];
  let h=`<div class="pg-title">Fate Dice</div><div class="pg-sub">4dF + Skill + Modifier</div><div class="card"><div class="grid-2 mb-2"><div class="form-group"><label>Skill</label><select id="d-sk" onchange="updateDP()"><option value="">— None —</option>${SKILLS.map(sk=>`<option value="${sk}">${sk} (+${ch?.skills?.[sk]||0})</option>`).join('')}${exSkills.length?`<optgroup label="Team: ${esc(S.team.name)}">${exSkills.map(sk=>`<option value="team:${sk}">${sk} (+${ex.skills[sk]||0})</option>`).join('')}</optgroup>`:''}</select></div><div class="form-group"><label>Modifier</label><input type="number" id="d-mod" value="0" onchange="updateDP()"></div></div><div id="d-preview" class="tac text-muted mb-2" style="font-size:12px"></div><div class="tac"><button class="roll-btn" onclick="doRoll()">ROLL</button></div></div><div id="d-result"></div>`;
  if(ch)h+=`<div class="card" style="display:flex;align-items:center;justify-content:space-between"><div class="label">Fate Points</div><div style="display:flex;align-items:center;gap:8px"><button class="sk-btn" onclick="adjFP(-1);renderDice()">−</button><span style="font-size:22px;font-weight:900;color:var(--gold)">${ch.fatePoints}</span><button class="sk-btn" onclick="adjFP(1);renderDice()">+</button></div></div>`;
  h+=`<div id="d-actions" style="display:none" class="card tac"><button class="btn btn-gold btn-sm" onclick="invokeAsp()">Invoke (+2)</button> <button class="btn btn-secondary btn-sm" onclick="rerollDice()">Reroll</button> <button class="btn btn-success btn-sm" onclick="compelAsp()">Compel (+1 FP)</button></div><div id="d-hist"></div>`;
  el.innerHTML=h;renderDR();
}
let _loadedSkill='',_loadedMod=0,_loadedPower='';
function loadRoll(skill,bonus,powerName){
  _loadedSkill=skill;_loadedMod=bonus||0;_loadedPower=powerName||'';
  // Update mobile bar
  const msk=document.getElementById('dm-sk');if(msk){msk.value=skill;}
  const mmod=document.getElementById('dm-mod');if(mmod)mmod.value=_loadedMod;
  const mbar=document.getElementById('dice-bar-body');if(mbar)mbar.classList.add('open');
  updateLoadedInfo('m');
  // Update sidebar
  const ssk=document.getElementById('ds-sk');if(ssk)ssk.value=skill;
  const smod=document.getElementById('ds-mod');if(smod)smod.value=_loadedMod;
  updateLoadedInfo('s');
}
function updateLoadedInfo(target){
  const sk=target==='s'?document.getElementById('ds-sk')?.value:document.getElementById('dm-sk')?.value;
  const sv=S.char?.skills?.[sk]||0;
  const mod=parseInt((target==='s'?document.getElementById('ds-mod'):document.getElementById('dm-mod'))?.value)||0;
  const label=_loadedPower||sk||'';
  const el=document.getElementById(target==='s'?'ds-loaded':'dm-loaded-info');
  const el2=document.getElementById('dm-loaded');
  if(el&&target==='m')el.innerHTML=label?`<div style="font-size:12px;color:var(--purple);font-weight:700;font-family:var(--font-title)">${esc(label)}</div>`:'';
  if(el2)el2.textContent=label?' \u2022 '+label:'';
}
function fateOutcome(shifts){
  if(shifts<0)return{label:'FAIL',color:'var(--red)',desc:'You don\u2019t achieve your goal.'};
  if(shifts===0)return{label:'TIE',color:'var(--yellow)',desc:'Success at a minor cost.'};
  if(shifts<=2)return{label:'SUCCESS',color:'var(--green)',desc:shifts+' shift'+(shifts>1?'s':'')+'.'};
  return{label:'SUCCESS WITH STYLE',color:'var(--cyan)',desc:shifts+' shifts! Gain a Boost.'};
}
function renderRollResult(d,tn,target){
  const dh=d.dice.map(v=>`<span class="fate-die ${v>0?'plus':v<0?'minus':'blank'}" style="width:${target==='s'?'36':'32'}px;height:${target==='s'?'36':'32'}px;font-size:${target==='s'?'20':'18'}px;border-radius:${target==='s'?'8':'6'}px">${v>0?'+':v<0?'\u2212':'0'}</span>`).join('');
  const shifts=d.total-tn;
  const out=fateOutcome(shifts);
  const pn=d.powerName?`<div style="font-size:14px;font-weight:900;font-family:var(--font-title);color:var(--purple);margin-bottom:2px">${d.powerName}</div>`:'';
  return`<div style="text-align:center"><div style="display:flex;gap:${target==='s'?'6':'8'}px;justify-content:center;margin-bottom:6px">${dh}</div>${pn}<div style="font-size:10px;color:var(--muted)">${d.skill?d.skill+' (+'+d.skillVal+')':'Flat roll'}${d.mod?' + bonus(+'+d.mod+')':''}${tn?' vs TN '+tn:''}</div><div style="font-size:22px;font-weight:900;font-family:var(--font-title);color:var(--accent);margin:2px 0">${d.total>=0?'+':''}${d.total} ${ladderName(d.total)}</div>${tn!==0||tn===0?`<div style="font-size:16px;font-weight:900;color:${out.color};margin:2px 0">${out.label}</div><div style="font-size:11px;color:var(--muted)">${out.desc}</div>`:''}<div style="margin-top:6px"><button class="btn btn-gold btn-xs" onclick="if(S.char&&S.char.fatePoints>0){S.char.fatePoints--;S.dice.total+=2;save();refreshRollResult('${target}');}else alert('No FP!')">Invoke +2</button> <button class="btn btn-secondary btn-xs" onclick="if(S.char&&S.char.fatePoints>0){S.char.fatePoints--;S.dice.dice=[rollFD(),rollFD(),rollFD(),rollFD()];S.dice.diceSum=S.dice.dice.reduce((a,b)=>a+b,0);S.dice.total=S.dice.diceSum+S.dice.skillVal+S.dice.mod;save();refreshRollResult('${target}');}else alert('No FP!')">Reroll</button>${target==='m'?' <button class="btn btn-xs btn-secondary" onclick="document.getElementById(\\\'quick-roll-toast\\\').innerHTML=\\\'\\\'">Dismiss</button>':''}</div></div>`;
}
function refreshRollResult(target){
  const d=S.dice;if(!d)return;
  const tn=d.tn||0;
  if(target==='s'){const el=document.getElementById('ds-result');if(el)el.innerHTML=renderRollResult(d,tn,'s');renderSheet();}
  else{const toast=document.getElementById('quick-roll-toast');if(toast)toast.innerHTML=`<div class="card" style="border-color:var(--accent);animation:fadeIn .15s ease">${renderRollResult(d,tn,'m')}</div>`;}
}
function doSidebarRoll(){
  const sk=document.getElementById('ds-sk')?.value||'';
  const mod=parseInt(document.getElementById('ds-mod')?.value)||0;
  const tn=parseInt(document.getElementById('ds-tn')?.value)||0;
  const sv=getSkillVal(sk);
  const dice=[rollFD(),rollFD(),rollFD(),rollFD()];
  const ds=dice.reduce((a,b)=>a+b,0);
  const tot=ds+sv+mod;
  S.dice={skill:getSkillLabel(sk),skillVal:sv,mod,dice,diceSum:ds,total:tot,powerName:_loadedPower,tn};
  save();
  const el=document.getElementById('ds-result');if(el)el.innerHTML=renderRollResult(S.dice,tn,'s');
}
function doMobileRoll(){
  const sk=document.getElementById('dm-sk')?.value||'';
  const mod=parseInt(document.getElementById('dm-mod')?.value)||0;
  const tn=parseInt(document.getElementById('dm-tn')?.value)||0;
  const sv=S.char?.skills?.[sk]||0;
  const dice=[rollFD(),rollFD(),rollFD(),rollFD()];
  const ds=dice.reduce((a,b)=>a+b,0);
  const tot=ds+sv+mod;
  S.dice={skill:sk,skillVal:sv,mod,dice,diceSum:ds,total:tot,powerName:_loadedPower,tn};
  save();
  const toast=document.getElementById('quick-roll-toast');
  if(toast){toast.innerHTML=`<div class="card" style="border-color:var(--accent);animation:fadeIn .15s ease">${renderRollResult(S.dice,tn,'m')}</div>`;toast.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
function updateDSP(){}
function getSkillVal(sk){if(sk.startsWith('team:')){const tsk=sk.substring(5);return S.team?.expanded?.skills?.[tsk]||0;}return S.char?.skills?.[sk]||0;}
function getSkillLabel(sk){return sk.startsWith('team:')?sk.substring(5):sk;}
function updateDP(){const sk=document.getElementById('d-sk')?.value,mod=parseInt(document.getElementById('d-mod')?.value)||0,sv=getSkillVal(sk||'');const el=document.getElementById('d-preview');if(el)el.textContent=sk?`4dF + ${getSkillLabel(sk)}(+${sv})${mod?' + '+(mod>0?'+':'')+mod:''}`:'4dF';}
function rollFD(){return[-1,0,1][Math.floor(Math.random()*3)];}
function doRoll(){const sk=document.getElementById('d-sk')?.value||'',mod=parseInt(document.getElementById('d-mod')?.value)||0,sv=getSkillVal(sk),dice=[rollFD(),rollFD(),rollFD(),rollFD()],ds=dice.reduce((a,b)=>a+b,0),tot=ds+sv+mod;S.dice={skill:getSkillLabel(sk),skillVal:sv,mod,dice,diceSum:ds,total:tot};save();renderDR();}
function renderDR(){
  const area=document.getElementById('d-result'),act=document.getElementById('d-actions');if(!area)return;const d=S.dice;
  if(!d||!d.dice){area.innerHTML='';if(act)act.style.display='none';return;}
  const dh=d.dice.map(v=>`<div class="fate-die ${v>0?'plus':v<0?'minus':'blank'}">${v>0?'+':v<0?'\u2212':'0'}</div>`).join('');
  area.innerHTML=`<div class="card tac"><div style="display:flex;gap:10px;justify-content:center;margin-bottom:10px">${dh}</div><div style="font-size:12px;color:var(--muted)">Dice: ${d.diceSum>=0?'+':''}${d.diceSum}${d.skill?' | '+d.skill+': +'+d.skillVal:''}${d.mod?' | Mod: '+(d.mod>=0?'+':'')+d.mod:''}</div><div style="font-size:32px;font-weight:900;font-family:var(--font-title);color:var(--accent);margin:4px 0">${d.total>=0?'+':''}${d.total}</div><div style="font-size:16px;font-weight:700">${ladderName(d.total)}</div></div>`;
  if(act)act.style.display=S.char?'block':'none';
}
function invokeAsp(){if(!S.char||S.char.fatePoints<=0)return alert('No Fate Points!');S.char.fatePoints--;S.dice.total+=2;save();renderDR();renderDice();}
function rerollDice(){if(!S.char||S.char.fatePoints<=0)return alert('No Fate Points!');S.char.fatePoints--;S.dice.dice=[rollFD(),rollFD(),rollFD(),rollFD()];S.dice.diceSum=S.dice.dice.reduce((a,b)=>a+b,0);S.dice.total=S.dice.diceSum+S.dice.skillVal+S.dice.mod;save();renderDR();}
function compelAsp(){if(!S.char)return;S.char.fatePoints++;save();renderDice();}

// CONFLICT
// ═══════════════════════════════════════════════════════════
function renderConflict(){
  const el=document.getElementById('conflict-content'),c=S.conflict;
  let h=`<div class="pg-title">Conflict</div><div class="pg-sub">Zone-based combat tracker</div>`;
  if(!c.active){h+=`<div class="tac" style="padding:30px"><div style="font-size:36px;margin-bottom:8px">\u2694</div><div class="text-muted mb-3">No active conflict</div><button class="btn btn-primary" onclick="startConflict()">Start Conflict</button></div>`;}
  else{
    h+=`<div class="card-sm" style="display:flex;justify-content:space-between;align-items:center"><div><span class="label">Round</span> <span class="fw-700 text-accent" style="font-size:20px">${c.round}</span></div><div style="display:flex;gap:4px"><button class="btn btn-secondary btn-xs" onclick="nextRound()">Next Round</button><button class="btn btn-danger btn-xs" onclick="endConflict()">End</button></div></div>`;
    h+=`<div class="card"><div class="label mb-1">Turn Order</div>`;
    c.turnOrder.forEach((t,i)=>{h+=`<div class="combatant ${i===c.currentTurn?'current':''}"><div style="width:20px;font-size:12px;font-weight:700;color:${i===c.currentTurn?'var(--accent)':'var(--muted)'}">${i+1}</div><div style="flex:1;font-weight:600;font-size:13px">${esc(t.name)}</div><span style="font-size:11px;color:var(--muted)">${t.type}</span><button class="btn btn-danger btn-xs" onclick="S.conflict.turnOrder.splice(${i},1);if(S.conflict.currentTurn>=${i}&&S.conflict.currentTurn>0)S.conflict.currentTurn--;save();renderConflict()" style="padding:2px 6px">X</button></div>`;});
    h+=`<div style="display:flex;gap:4px;margin-top:6px"><input id="ct-name" placeholder="Name" style="flex:1;font-size:12px;padding:6px"><select id="ct-type" style="width:80px;font-size:12px;padding:6px"><option>Hero</option><option>NPC</option><option>Villain</option><option>Team</option></select><button class="btn btn-secondary btn-xs" onclick="addCombat()">Add</button></div>`;
    if(S.team?.expanded&&!c.turnOrder.some(t=>t.type==='Team')){h+=`<button class="btn btn-gold btn-xs btn-full mt-1" onclick="S.conflict.turnOrder.push({name:'${esc(S.team.name)} (Team)',type:'Team'});S.conflict.log.push('${esc(S.team.name)} joined');save();renderConflict()">+ Add ${esc(S.team.name)}</button>`;}
    h+=`<button class="btn btn-primary btn-sm btn-full mt-2" onclick="nextTurn()">Next Turn \u2192</button></div>`;
    h+=`<div class="card"><div class="label mb-1">Zones</div>`;
    c.zones.forEach((z,i)=>{h+=`<div class="zone-card"><div style="display:flex;justify-content:space-between;align-items:center"><div class="zone-name">${esc(z.name)}</div><button class="btn btn-danger btn-xs" onclick="S.conflict.zones.splice(${i},1);save();renderConflict()">X</button></div>${z.aspects?`<div style="font-size:11px;color:var(--muted);font-style:italic">${esc(z.aspects)}</div>`:''}<div style="font-size:11px;margin-top:4px">${(z.occupants||[]).map(o=>`<span class="tag" style="background:var(--surface3);color:var(--text);border:1px solid var(--border)">${esc(o)}</span>`).join(' ')}</div><div style="display:flex;gap:4px;margin-top:4px"><input id="za-${i}" placeholder="Add occupant" style="flex:1;font-size:11px;padding:4px"><button class="btn btn-secondary btn-xs" onclick="addToZone(${i})">+</button></div></div>`;});
    h+=`<div style="display:flex;gap:4px"><input id="zn-name" placeholder="New zone" style="flex:1;font-size:12px;padding:6px"><button class="btn btn-secondary btn-xs" onclick="addZone()">+ Zone</button></div></div>`;
    if(c.log.length){h+=`<div class="card"><div class="label mb-1">Log</div>`;c.log.slice(-8).reverse().forEach(e=>{h+=`<div style="font-size:11px;color:var(--muted);padding:2px 0">${esc(e)}</div>`;});h+='</div>';}
  }
  el.innerHTML=h;
}
function startConflict(){S.conflict={active:true,zones:[{name:'Zone 1',aspects:'',occupants:[]}],turnOrder:[],currentTurn:0,round:1,log:['Conflict started']};if(S.char)S.conflict.turnOrder.push({name:S.char.costumedName,type:'Hero'});if(S.team?.expanded)S.conflict.turnOrder.push({name:S.team.name+' (Team)',type:'Team'});save();renderConflict();}
function endConflict(){if(confirm('End conflict?')){S.conflict={active:false,zones:[],turnOrder:[],currentTurn:0,round:1,log:[]};save();renderConflict();}}
function nextTurn(){const c=S.conflict;c.currentTurn=(c.currentTurn+1)%Math.max(1,c.turnOrder.length);c.log.push('Turn: '+(c.turnOrder[c.currentTurn]?.name||'?'));save();renderConflict();}
function nextRound(){S.conflict.round++;S.conflict.currentTurn=0;S.conflict.log.push('--- Round '+S.conflict.round+' ---');save();renderConflict();}
function addCombat(){const n=document.getElementById('ct-name').value.trim(),t=document.getElementById('ct-type').value;if(!n)return;S.conflict.turnOrder.push({name:n,type:t});S.conflict.log.push(n+' joined');save();renderConflict();}
function addZone(){const n=document.getElementById('zn-name').value.trim()||('Zone '+(S.conflict.zones.length+1));S.conflict.zones.push({name:n,aspects:'',occupants:[]});save();renderConflict();}
function addToZone(i){const inp=document.getElementById('za-'+i),n=inp?.value?.trim();if(!n)return;S.conflict.zones[i].occupants.push(n);save();renderConflict();}

// JOURNAL (LOG SYSTEM)
// ═══════════════════════════════════════════════════════════
window._logNewest=true;window._logReorder=false;window._logDragSrc=null;

function parseIssues(log){const g=[];let cur={label:'Campaign Log',entries:[]};log.forEach(e=>{if(e.type==='issue_break'){g.push(cur);cur={label:e.title||'Issue',entries:[]};}else cur.entries.push(e);});g.push(cur);return g.filter(g=>g.label==='Campaign Log'?g.entries.length>0:true);}

function renderNotes(){
  const el=document.getElementById('notes-content');if(!el)return;
  const nf=window._logNewest,reorder=window._logReorder,entries=S.notes||[];
  let h='';
  // Header
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px"><div class="pg-title">Journal</div><div style="display:flex;gap:4px;flex-wrap:wrap">`;
  if(!reorder){
    h+=`<button class="btn btn-xs btn-gold" onclick="addIssueBreak()">\u25b6 NEW ISSUE</button>`;
    h+=`<button class="btn btn-xs btn-secondary" onclick="exportLog()">\u2197 Export</button>`;
    h+=`<button class="btn btn-xs btn-secondary" onclick="window._logNewest=!window._logNewest;renderNotes()">${nf?'\u2193 Newest':'\u2191 Oldest'}</button>`;
  }
  h+=`<button class="btn btn-xs ${reorder?'btn-primary':'btn-secondary'}" onclick="window._logReorder=!window._logReorder;renderNotes()">${reorder?'\u2713 Done':'\u2982 Reorder'}</button>`;
  h+=`</div></div>`;

  if(!entries.length){
    h+=`<div class="tac" style="padding:40px"><div style="font-size:36px;margin-bottom:8px">\ud83d\udcd6</div><div class="text-muted">No entries yet. Start a new Issue or add an entry.</div></div>`;
  } else {
    const ordered=(nf&&!reorder)?[...entries].map((n,i)=>({n,i})).reverse():entries.map((n,i)=>({n,i}));
    ordered.forEach(({n:entry,i})=>{
      const drag=reorder?` draggable="true" ondragstart="logDS(event,${i})" ondragover="logDO(event)" ondragleave="logDL(event)" ondrop="logDD(event,${i})"`:' ';
      if(entry.type==='issue_break'){
        h+=`<div class="log-episode"${drag}>${reorder?'<span class="log-grip">\u2982</span>':''}<div class="log-episode-label">${esc(entry.title||'Issue')}</div>${!reorder?`<button class="btn btn-xs btn-secondary" onclick="editIssue(${i})" style="padding:2px 6px">\u270e</button><button class="btn btn-xs btn-danger" onclick="deleteLogEntry(${i})" style="padding:2px 6px">\u2715</button>`:''}</div>`;
        return;
      }
      const ti=LOG_TYPES.find(t=>t.key===entry.type)||LOG_TYPES[0];
      const emoji=entry.emoji||ti.emoji;
      const isMajor=entry.type==='main',isAlert=entry.type==='battle',isSupp=entry.type==='supplemental';
      const cls=isMajor?'log-major':isAlert?'log-alert':isSupp?'log-supplemental':'log-base';
      h+=`<div class="${cls}"${drag}${reorder?' style="cursor:grab"':''}>
        <div style="display:flex;align-items:flex-start;gap:8px">
          ${reorder?'<span class="log-grip" style="margin-top:2px">\u2982</span>':''}
          <span style="font-size:${isMajor?'20':'16'}px">${emoji}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:${isMajor?'14':'12'}px;font-weight:700;color:${isMajor?'var(--accent)':isAlert?'var(--red)':isSupp?'var(--blue)':'var(--text)'}">${esc(entry.title||ti.label)}</div>
            <div style="font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:1px">${ti.label} \u00b7 ${entry.date||''}</div>
          </div>
          ${!reorder?`<button class="btn btn-xs btn-secondary" onclick="editLogEntry(${i})" style="padding:2px 6px">\u270e</button><button class="btn btn-xs btn-danger" onclick="deleteLogEntry(${i})" style="padding:2px 6px">\u2715</button>`:''}
        </div>
        ${entry.body?`<div style="font-size:${isMajor?'13':'12'}px;color:var(--text);line-height:1.6;margin-top:6px;white-space:pre-wrap">${esc(entry.body)}</div>`:''}
      </div>`;
    });
  }
  // FAB
  if(!reorder)h+=`<div style="position:fixed;bottom:80px;right:20px;z-index:50"><button class="roll-btn" style="width:52px;height:52px;font-size:28px" onclick="showAddEntry()">+</button></div>`;
  el.innerHTML=h;
}

// Issue breaks
function addIssueBreak(){
  const n=S.notes.filter(e=>e.type==='issue_break').length+1;
  const val=prompt('Issue label:','Issue '+n);if(!val||!val.trim())return;
  S.notes.push({type:'issue_break',title:val.trim()});
  save();renderNotes();showAddEntry();
}
function editIssue(i){const e=S.notes[i];if(!e)return;const v=prompt('Issue label:',e.title||'Issue');if(v&&v.trim()){e.title=v.trim();save();renderNotes();}}

// Add entry flow
function showAddEntry(){
  let h=`<div class="card"><div class="pg-title" style="font-size:18px;margin-bottom:8px">New Entry</div>`;
  h+=`<div class="label mb-2">Select type</div>`;
  // Primary
  const main=LOG_TYPES[0];
  h+=`<button class="btn btn-primary btn-full mb-2" onclick="showEntryForm('${main.key}')" style="padding:14px;font-size:14px">${main.emoji} ${main.label}</button>`;
  // Secondary
  const supp=LOG_TYPES[1];
  h+=`<button class="btn btn-secondary btn-full mb-2" onclick="showEntryForm('${supp.key}')">${supp.emoji} ${supp.label}</button>`;
  // Rest
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">`;
  LOG_TYPES.slice(2).forEach(t=>{h+=`<button class="btn btn-secondary" onclick="showEntryForm('${t.key}')" style="padding:10px;font-size:12px">${t.emoji} ${t.label}</button>`;});
  h+=`</div></div>`;
  document.getElementById('notes-content').innerHTML=h;
}

function showEntryForm(typeKey){
  const t=LOG_TYPES.find(l=>l.key===typeKey)||LOG_TYPES[0];
  let h=`<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><button class="btn btn-secondary btn-xs" onclick="renderNotes()">\u2190 Back</button><span style="font-size:18px">${t.emoji}</span><span class="pg-title" style="font-size:16px;margin:0">${t.label}</span></div>`;
  h+=`<div style="font-size:11px;color:var(--muted);margin-bottom:8px">${t.desc}</div>`;
  h+=`<div class="form-group"><label>Title</label><input id="log-title-in" placeholder="${esc(t.placeholder)}"></div>`;
  h+=`<div class="form-group"><label>Entry</label><textarea id="log-body-in" rows="6" placeholder="${esc(t.desc)}"></textarea></div>`;
  h+=`<input type="hidden" id="log-type-in" value="${t.key}"><input type="hidden" id="log-emoji-in" value="${t.emoji}">`;
  h+=`<div style="display:flex;gap:8px"><button class="btn btn-primary" style="flex:1" onclick="saveNewEntry()">Save Entry</button><button class="btn btn-secondary" onclick="renderNotes()">Cancel</button></div></div>`;
  document.getElementById('notes-content').innerHTML=h;
}

function saveNewEntry(){
  const type=document.getElementById('log-type-in').value;
  const emoji=document.getElementById('log-emoji-in').value;
  const title=document.getElementById('log-title-in').value.trim();
  const body=document.getElementById('log-body-in').value.trim();
  if(!title&&!body)return;
  const now=new Date();const date=now.getFullYear()+'.'+String(now.getMonth()+1).padStart(2,'0')+'.'+String(now.getDate()).padStart(2,'0');
  S.notes.push({type,emoji,title,body,date});
  save();renderNotes();
}

// Edit/delete
function editLogEntry(i){
  const entry=S.notes[i];if(!entry)return;
  const t=LOG_TYPES.find(l=>l.key===entry.type)||LOG_TYPES[0];
  let h=`<div class="card"><div class="pg-title" style="font-size:16px;margin-bottom:8px">\u270e Edit Entry</div>`;
  h+=`<div class="form-group"><label>Title</label><input id="log-title-in" value="${esc(entry.title||'')}" placeholder="${esc(t.placeholder)}"></div>`;
  h+=`<div class="form-group"><label>Entry</label><textarea id="log-body-in" rows="6">${esc(entry.body||'')}</textarea></div>`;
  h+=`<input type="hidden" id="log-edit-idx" value="${i}">`;
  h+=`<div style="display:flex;gap:8px"><button class="btn btn-primary" style="flex:1" onclick="saveEntryEdit()">Save</button><button class="btn btn-secondary" onclick="renderNotes()">Cancel</button></div></div>`;
  document.getElementById('notes-content').innerHTML=h;
}
function saveEntryEdit(){
  const i=parseInt(document.getElementById('log-edit-idx').value);
  const entry=S.notes[i];if(!entry)return;
  entry.title=document.getElementById('log-title-in').value.trim();
  entry.body=document.getElementById('log-body-in').value.trim();
  save();renderNotes();
}
function deleteLogEntry(i){if(!confirm('Delete this entry?'))return;S.notes.splice(i,1);save();renderNotes();}

function logDO(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('log-drag-over');}

function logDD(e,t){e.preventDefault();e.currentTarget.classList.remove('log-drag-over');const s=window._logDragSrc;if(s==null||s===t){window._logDragSrc=null;return;}const item=S.notes.splice(s,1)[0];S.notes.splice(s<t?t-1:t,0,item);window._logDragSrc=null;save();renderNotes();}

nction(v,i){s+='<div class="sb'+(v?' f':'')+'\">'+(i+1)+'</div>';});s+='</div><div style="margin-top:8px"><div class="hl">Mental</div>';d.char.stress.mental.forEach(function(v,i){s+='<div class="sb'+(v?' f':'')+'\">'+(i+1)+'</div>';});s+='</div><div style="margin-top:12px;font-size:28px;font-weight:900;color:#f1c40f">FP: '+d.char.fatePoints+'</div>';document.getElementById('hs').innerHTML=s;}if(d.dice&&d.dice.dice){var dh=d.dice.dice.map(function(v){return'<div class="fd'+(v>0?' p':v<0?' m':'')+'\">'+(v>0?'+':v<0?'\\u2212':'0')+'</div>';}).join('');dh+='<div style="font-size:48px;font-weight:900;font-family:Bangers;color:#e63946;margin-top:8px">'+(d.dice.total>=0?'+':'')+d.dice.total+'</div>';document.getElementById('hd').innerHTML=dh;}if(d.conflict&&d.conflict.active){var c='<div style="font-size:16px;font-weight:700">Round '+d.conflict.round+'</div>';d.conflict.turnOrder.forEach(function(t,i){c+='<div style="padding:4px 0;'+(i===d.conflict.currentTurn?'color:#e63946;font-weight:700':'color:#7a8a9e')+'">'+t.name+'</div>';});document.getElementById('hcf').innerHTML=c;}else document.getElementById('hcf').innerHTML='<div style="color:#7a8a9e">No conflict</div>';if(d.notes&&d.notes.length){var n='';d.notes.slice(-5).forEach(function(x){n+='<div style="font-size:13px;padding:2px 0;color:#ccc">'+(x.text||'')+'</div>';});document.getElementById('hn2').innerHTML=n;}};<\/script></body></html>`;}

function defaultRegion(name){
  const cells=Array.from({length:25},(_,i)=>({type:'unknown',isVoid:false,isCurrent:i===12,name:i===12?'':'',icon:'',notes:'',feature:'',subZone:null}));
  return{name:name||'Downtown',cells,currentCell:12};
}
window._mapZoom=null;window._selMapCell=null;
function heroMarker(){return S.char?esc(S.char.costumedName.charAt(0)):'H';}
function isAdj(a,b){const ar=Math.floor(a/5),ac=a%5,br=Math.floor(b/5),bc=b%5;return Math.abs(ar-br)+Math.abs(ac-bc)===1;}

function renderMap(){
  if(!S.regions)S.regions=[defaultRegion()];
  if(S.activeRegion===undefined)S.activeRegion=0;
  const el=document.getElementById('map-content');
  el.innerHTML=renderMapContent();
}

function renderMapContent(){
  const region=S.regions[S.activeRegion];if(!region)return'<div class="card">No region data.</div>';

  // SUB-ZONE VIEW
  if(window._mapZoom){
    const sz=window._mapZoom.subZone,szCI=window._mapZoom.cellIdx;
    let g='<div id="map-grid">';
    for(let i=0;i<25;i++){const c=sz.cells[i],cur=sz.currentCell===i,adj=isAdj(sz.currentCell,i)&&!c.isVoid;
      let cls='map-cell';if(c.isVoid)cls+=' void';else if(cur)cls+=' current';else if(adj)cls+=' adjacent';else if(c.type==='explored')cls+=' explored';else cls+=' unexplored';
      const ico=c.icon||(cur?`<span style="color:var(--accent);font-weight:900;font-family:var(--font-title);font-size:22px">${heroMarker()}</span>`:'<span style="color:var(--muted)">\u00b7</span>');
      g+=`<div class="${cls}" onclick="clickSZCell(${i})"><span class="cell-num">${i+1}</span><span class="cell-icon">${ico}</span>${c.name?`<span class="cell-name">${esc(c.name)}</span>`:''}</div>`;}
    g+='</div>';
    const si=window._selMapCell??sz.currentCell,sc=sz.cells[si];
    let det='';
    if(sc&&!sc.isVoid){const cur=si===sz.currentCell,adj=isAdj(sz.currentCell,si);
      det=`<div class="card"><div class="fw-700" style="font-size:14px;font-family:var(--font-title);color:var(--accent);margin-bottom:6px">Area ${si+1}: ${esc(sc.name)||'Unknown'}</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${!cur&&adj?`<button class="btn btn-primary btn-xs" onclick="travelSZ(${si})">Travel Here</button>`:''}<button class="btn btn-secondary btn-xs" onclick="toggleSZVoid(${si})">${sc.isVoid?'Clear Void':'Mark Void'}</button></div><div class="form-group"><label>Name</label><input value="${esc(sc.name)}" onchange="setSZProp(${si},'name',this.value)" placeholder="e.g. Rooftop, Lab, Alley..."></div><div class="form-group"><label>Icon (emoji)</label><input value="${esc(sc.icon)}" onchange="setSZProp(${si},'icon',this.value)" placeholder="e.g. 🏢 🔬 🌃"></div><div class="form-group"><label>Feature</label><input value="${esc(sc.feature)}" onchange="setSZProp(${si},'feature',this.value)" placeholder="e.g. Sniper Nest, Evidence Room..."></div><div class="form-group"><label>Notes</label><textarea rows="2" onchange="setSZProp(${si},'notes',this.value)">${esc(sc.notes)}</textarea></div></div>`;}
    return`<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap"><button class="btn btn-secondary btn-xs" onclick="exitSZ()">\u2190 Back to ${esc(region.name)}</button><span class="pg-title" style="font-size:18px;margin:0">${esc(sz.name)}</span>${sz.type?`<span class="tag" style="background:var(--surface3);color:var(--text);border:1px solid var(--border)">${sz.type}</span>`:''}</div><div class="form-group"><label>Zone Name</label><input value="${esc(sz.name)}" onchange="setSZName(this.value)" style="font-weight:700;color:var(--accent)"></div><div style="font-size:10px;color:var(--muted);margin-bottom:8px">Click adjacent area to travel. Click any cell to view/edit.</div>${g}<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:var(--muted)"><span style="color:var(--accent)">\u25a3 You</span><span style="color:var(--blue)">\u25a3 Adjacent</span><span>\u25a0 Explored</span><span style="opacity:.5">\u25a0 Unexplored</span><span style="opacity:.3">\u25a0 Void</span></div></div>${det}`;
  }

  // NORMAL REGION VIEW
  let sw='<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:10px">';
  S.regions.forEach((r,i)=>{sw+=`<button class="btn btn-xs ${i===S.activeRegion?'btn-primary':'btn-secondary'}" onclick="switchRegion(${i})">${esc(r.name)}</button>`;});
  sw+=`<button class="btn btn-xs btn-gold" onclick="newRegion()">+ New</button></div>`;

  let g='<div id="map-grid">';
  for(let i=0;i<25;i++){const c=region.cells[i],cur=region.currentCell===i,adj=isAdj(region.currentCell,i)&&!c.isVoid;
    let cls='map-cell';if(c.isVoid)cls+=' void';else if(cur)cls+=' current';else if(adj)cls+=' adjacent';else if(c.type==='explored')cls+=' explored';else cls+=' unexplored';
    const ico=c.icon||(cur?`<span style="color:var(--accent);font-weight:900;font-family:var(--font-title);font-size:22px">${heroMarker()}</span>`:'<span style="color:var(--muted)">\u00b7</span>');
    g+=`<div class="${cls}" onclick="clickMapCell(${i})"><span class="cell-num">${i+1}</span><span class="cell-icon">${ico}</span>${c.name?`<span class="cell-name">${esc(c.name)}</span>`:''}</div>`;}
  g+='</div>';

  const si=window._selMapCell??region.currentCell,sc=region.cells[si];
  let det='';
  if(sc&&!sc.isVoid){const cur=si===region.currentCell,adj=isAdj(region.currentCell,si);
    det=`<div class="card"><div class="fw-700" style="font-size:14px;font-family:var(--font-title);color:var(--accent);margin-bottom:6px">Location ${si+1}: ${esc(sc.name)||'Unknown'}</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${!cur&&adj?`<button class="btn btn-primary btn-xs" onclick="travelTo(${si})">Travel Here</button>`:''}<button class="btn btn-secondary btn-xs" onclick="toggleMapVoid(${si})">${sc.isVoid?'Clear Void':'Mark Void'}</button><button class="btn btn-gold btn-xs" onclick="enterSZ(${si})">Zoom In${sc.subZone?' ('+sc.subZone.type+')':''}</button></div><div class="form-group"><label>Location Name</label><input value="${esc(sc.name)}" onchange="setMapProp(${si},'name',this.value)" placeholder="e.g. Wayne Tower, City Hall, Docks..."></div><div class="form-group"><label>Icon (emoji)</label><input value="${esc(sc.icon)}" onchange="setMapProp(${si},'icon',this.value)" placeholder="e.g. 🏢 🏭 🌳 🏥 🏛"></div><div class="form-group"><label>Feature</label><input value="${esc(sc.feature)}" onchange="setMapProp(${si},'feature',this.value)" placeholder="e.g. Villain HQ, Hospital, Park..."></div><div class="form-group"><label>Notes</label><textarea rows="2" onchange="setMapProp(${si},'notes',this.value)">${esc(sc.notes)}</textarea></div></div>`;}

  const heroInfo=S.char?`<div class="card-sm" style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:22px;font-weight:900;font-family:var(--font-title);color:var(--accent)">${heroMarker()}</span><div><div style="font-weight:700;color:var(--accent)">${esc(S.char.costumedName)}</div><div style="font-size:10px;color:var(--muted)">${esc(S.char.civilianName)}</div></div></div>`:'';

  return`<div class="pg-title">Region Map</div><div class="pg-sub">Explore the city</div>${sw}<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-size:16px;font-weight:700;font-family:var(--font-title);color:var(--accent)">${esc(region.name)}</span><div style="display:flex;gap:4px"><button class="btn btn-secondary btn-xs" onclick="renameRegion()">Rename</button>${S.regions.length>1?`<button class="btn btn-danger btn-xs" onclick="deleteRegion()">Delete</button>`:''}</div></div>${heroInfo}<div style="font-size:10px;color:var(--muted);margin-bottom:8px">5\u00d75 grid. Click adjacent location to travel. Click any cell to view/edit.</div>${g}<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;font-size:10px;color:var(--muted)"><span style="color:var(--accent)">\u25a3 You</span><span style="color:var(--blue)">\u25a3 Adjacent</span><span>\u25a0 Explored</span><span style="opacity:.5">\u25a0 Unexplored</span><span style="opacity:.3">\u25a0 Void</span></div></div>${det}`;
}

// Region operations
function clickMapCell(i){window._selMapCell=i;const r=S.regions[S.activeRegion];if(r)r.cells[i].type='explored';save();renderMap();}
function travelTo(i){const r=S.regions[S.activeRegion];if(!r)return;r.cells[r.currentCell].isCurrent=false;r.currentCell=i;r.cells[i].isCurrent=true;r.cells[i].type='explored';window._selMapCell=i;save();renderMap();}
function setMapProp(i,p,v){const r=S.regions[S.activeRegion];if(r)r.cells[i][p]=v;save();}
function toggleMapVoid(i){const r=S.regions[S.activeRegion];if(r)r.cells[i].isVoid=!r.cells[i].isVoid;save();renderMap();}
function switchRegion(i){S.activeRegion=i;window._selMapCell=null;window._mapZoom=null;save();renderMap();}
function newRegion(){const n=prompt('Region name:','Neighborhood '+(S.regions.length+1));if(!n)return;S.regions.push(defaultRegion(n));S.activeRegion=S.regions.length-1;window._selMapCell=null;save();renderMap();}
function renameRegion(){const r=S.regions[S.activeRegion];if(!r)return;const n=prompt('Rename region:',r.name);if(n)r.name=n;save();renderMap();}
function deleteRegion(){if(S.regions.length<=1)return alert('Cannot delete the only region.');if(!confirm('Delete this region?'))return;S.regions.splice(S.activeRegion,1);S.activeRegion=Math.max(0,S.activeRegion-1);save();renderMap();}

// Sub-zone operations
function enterSZ(ci){
  const r=S.regions[S.activeRegion];if(!r)return;const c=r.cells[ci];
  if(!c.subZone){
    const types=['Building','Street','Underground','Rooftop','Hideout'];
    let h='<div class="card"><div class="pg-title" style="font-size:18px">Zone Type</div><div style="font-size:12px;color:var(--muted);margin-bottom:10px">What kind of location is this?</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
    types.forEach(t=>{const icons={Building:'\ud83c\udfe2',Street:'\ud83c\udfd9',Underground:'\ud83d\ude87',Rooftop:'\ud83c\udf06',Hideout:'\ud83d\udd75'};h+=`<button class="btn btn-primary" style="padding:12px;font-size:13px" onclick="createSZ(${ci},'${t}')">${icons[t]||''} ${t}</button>`;});
    h+='</div></div>';
    document.getElementById('map-content').innerHTML=h;return;
  }
  window._mapZoom={cellIdx:ci,subZone:c.subZone};window._selMapCell=null;renderMap();
}
function createSZ(ci,type){
  const r=S.regions[S.activeRegion];if(!r)return;const c=r.cells[ci];
  c.subZone={name:c.name||('Area '+(ci+1)),type,currentCell:12,cells:Array.from({length:25},()=>({name:'',icon:'',isVoid:false,notes:'',feature:'',type:'unknown'}))};
  save();window._mapZoom={cellIdx:ci,subZone:c.subZone};window._selMapCell=null;renderMap();
}
function exitSZ(){window._mapZoom=null;window._selMapCell=null;renderMap();}
function setSZName(v){if(!window._mapZoom)return;window._mapZoom.subZone.name=v;const r=S.regions[S.activeRegion];if(r)r.cells[window._mapZoom.cellIdx].subZone=window._mapZoom.subZone;save();}
function setSZProp(i,p,v){if(!window._mapZoom)return;window._mapZoom.subZone.cells[i][p]=v;const r=S.regions[S.activeRegion];if(r)r.cells[window._mapZoom.cellIdx].subZone=window._mapZoom.subZone;save();}
function clickSZCell(i){if(!window._mapZoom)return;window._selMapCell=i;window._mapZoom.subZone.cells[i].type='explored';const r=S.regions[S.activeRegion];if(r)r.cells[window._mapZoom.cellIdx].subZone=window._mapZoom.subZone;save();renderMap();}
function travelSZ(i){if(!window._mapZoom)return;const sz=window._mapZoom.subZone;sz.currentCell=i;sz.cells[i].type='explored';window._selMapCell=i;const r=S.regions[S.activeRegion];if(r)r.cells[window._mapZoom.cellIdx].subZone=sz;save();renderMap();}
function toggleSZVoid(i){if(!window._mapZoom)return;window._mapZoom.subZone.cells[i].isVoid=!window._mapZoom.subZone.cells[i].isVoid;const r=S.regions[S.activeRegion];if(r)r.cells[window._mapZoom.cellIdx].subZone=window._mapZoom.subZone;save();renderMap();}

function exportJSON(){
  const data=JSON.stringify(S,null,2);
  const name=S.char?.costumedName||S.creation?.costumedName||'slot';
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=name.replace(/[^a-zA-Z0-9_-]/g,'_')+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.addEventListener('change',()=>{
    const file=inp.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        const data=JSON.parse(e.target.result);
        if(!data.series&&!data.char&&!data.creation){alert('Invalid save file.');return;}
        S=data;save();closeSlotModal();renderAll();
      }catch(err){alert('Failed to parse JSON: '+err.message);}
    };
    reader.readAsText(file);
  });
  inp.click();
}
(function(){let a=null;try{a=localStorage.getItem('dc_active_slot');}catch(e){}if(a!==null&&a!=='')loadSlot(parseInt(a));renderHero();if(currentSlot===null)openSlotModal();})();
</script>
